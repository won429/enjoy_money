<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Enjoy - 회비 관리자</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            overscroll-behavior-y: none;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        /* 입력 필드 공통 */
        .fld { background:#000; border:1px solid #3a3a3c; color:#fff; border-radius:0.6rem; outline:none; transition:border-color .15s; }
        .fld:focus { border-color:#3182F6; }
        .sec-label { font-size:11px; font-weight:700; letter-spacing:-0.01em; }
        .ledger-summary-card { background:#242426; border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:11px 12px; }
        input[type="date"] { color-scheme:dark; min-width:0; }
        input[type="date"]::-webkit-date-and-time-value { text-align:left; margin:0; }
    </style>
</head>
<body class="w-full min-h-[100dvh] flex flex-col items-center justify-center p-4 relative">

    <!-- Password UI -->
    <div id="password-screen" class="bg-[#1C1C1E] rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center relative border border-white/5 flex flex-col scale-in z-10">
        <div class="w-14 h-14 rounded-2xl bg-blue-500/15 text-blue-400 flex items-center justify-center text-2xl mx-auto mb-4"><i class="fa-solid fa-lock"></i></div>
        <h3 class="text-lg font-bold text-[#F2F4F6] mb-1">관리자 인증</h3>
        <p class="text-xs text-gray-500 mb-4">비밀번호 4자리를 입력하세요</p>
        <input type="password" id="admin-password-input" onkeydown="if(event.key==='Enter')window.checkPassword()" class="w-full bg-[#2C2C2E] border border-gray-700 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-center text-lg tracking-[0.5em] mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••" maxlength="4">
        <div class="flex gap-2">
            <button onclick="window.location.href='index.html'" class="flex-1 bg-[#2C2C2E] text-gray-400 font-bold py-3 rounded-xl active:bg-gray-700 transition-colors">돌아가기</button>
            <button onclick="window.checkPassword()" class="flex-1 bg-blue-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-blue-600 active:bg-blue-700 transition-colors">확인</button>
        </div>
    </div>

    <!-- Admin UI (Hidden initially) -->
    <div id="admin-screen" class="hidden bg-[#1C1C1E] rounded-3xl p-5 w-full max-w-sm shadow-2xl relative overflow-hidden flex-col border border-white/5 h-[88vh] max-h-[820px] scale-in z-10">

        <!-- Header -->
        <div class="flex justify-between items-center mb-3 shrink-0">
            <h3 class="text-[17px] font-bold text-[#F2F4F6] flex items-center gap-2">
                <span class="w-7 h-7 rounded-lg bg-blue-500/15 text-blue-400 flex items-center justify-center text-[13px]"><i class="fa-solid fa-wallet"></i></span>
                회비 관리자
            </h3>
            <div class="flex items-center gap-2">
                <button id="admin-db-login" onclick="window.adminFirebaseLogin && window.adminFirebaseLogin()" class="h-8 px-2.5 rounded-lg bg-[#2C2C2E] text-gray-400 hover:text-white active:scale-95 transition-all flex items-center gap-1.5 text-[10px] font-bold" title="Firebase 로그인">
                    <i class="fa-solid fa-cloud"></i><span id="admin-db-status">DB 연결</span>
                </button>
                <button onclick="window.location.href='index.html'" class="w-8 h-8 rounded-lg bg-[#2C2C2E] text-gray-400 hover:text-white active:scale-90 transition-all flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>

        <!-- Tab bar (segmented control) -->
        <div class="flex gap-1 bg-[#2C2C2E] p-1 rounded-xl mb-4 shrink-0">
            <button data-tab="dues" onclick="window.switchAdminTab('dues')" class="admin-tab flex-1 py-2 rounded-lg text-[12.5px] font-bold transition-colors"><i class="fa-solid fa-coins mr-1 text-[11px]"></i>납부현황</button>
            <button data-tab="expense" onclick="window.switchAdminTab('expense')" class="admin-tab flex-1 py-2 rounded-lg text-[12.5px] font-bold transition-colors"><i class="fa-solid fa-book-open mr-1 text-[11px]"></i>가계부</button>
            <button data-tab="settings" onclick="window.switchAdminTab('settings')" class="admin-tab flex-1 py-2 rounded-lg text-[12.5px] font-bold transition-colors"><i class="fa-solid fa-gear mr-1 text-[11px]"></i>설정</button>
        </div>

        <!-- Content -->
        <div class="overflow-y-auto flex-1 pr-1 scrollbar-hide">

            <!-- ===== 납부현황 탭 ===== -->
            <div id="tab-dues" class="admin-tab-panel">
                <!-- 월 선택 -->
                <div class="flex items-center justify-between bg-[#2C2C2E] rounded-xl p-1 mb-5">
                    <button onclick="window.changeAdminMonth(-1)" class="w-9 h-9 rounded-lg text-gray-400 hover:text-white active:scale-90 transition-all flex items-center justify-center"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                    <span class="font-bold text-[15px] text-[#F2F4F6]"><span id="admin-month-title"></span>월 납부 현황</span>
                    <button onclick="window.changeAdminMonth(1)" class="w-9 h-9 rounded-lg text-gray-400 hover:text-white active:scale-90 transition-all flex items-center justify-center"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                </div>

                <!-- 총 잔액 -->
                <div class="mb-5">
                    <label class="sec-label text-gray-400 block mb-1.5">총 회비 잔액</label>
                    <div class="relative">
                        <input type="number" id="admin-total-balance" class="fld w-full px-4 py-3 pr-9 font-bold text-lg text-right" placeholder="금액 입력">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm">원</span>
                    </div>
                </div>

                <!-- 멤버별 납부 -->
                <div class="mb-5">
                    <label class="sec-label text-gray-400 block mb-2">멤버별 납부 상태</label>
                    <div id="admin-member-list" class="space-y-2"></div>
                </div>

                <!-- 면제권 -->
                <div class="mb-2">
                    <label class="sec-label text-emerald-400 block mb-2"><i class="fa-solid fa-ticket-simple mr-1"></i>면제권 관리</label>
                    <div id="admin-ticket-list" class="space-y-2"></div>
                </div>
            </div>

            <!-- ===== 가계부 탭 ===== -->
            <div id="tab-expense" class="admin-tab-panel hidden">
                <div class="bg-[#242426] border border-white/5 rounded-xl p-3 mb-3">
                    <label class="sec-label text-blue-400 block mb-1.5"><i class="fa-regular fa-calendar-check mr-1"></i>관리할 모임</label>
                    <select id="admin-ledger-meeting" onchange="window.selectLedgerMeeting(this.value)" class="fld w-full px-3 py-2.5 text-sm font-bold"></select>
                    <p id="admin-ledger-period" class="text-[10px] text-gray-500 mt-2 leading-snug"></p>
                </div>
                <button id="admin-add-expense" onclick="window.addExpense()" class="w-full mb-3 bg-blue-500/15 border border-blue-500/40 text-blue-400 font-bold py-2.5 rounded-xl text-sm active:scale-[0.98] transition-transform disabled:opacity-35 disabled:active:scale-100"><i class="fa-solid fa-plus mr-1.5"></i>선택한 모임에 항목 추가</button>
                <div id="admin-expense-summary" class="grid grid-cols-3 gap-2 mb-3"></div>
                <label class="flex items-start gap-2.5 bg-[#242426] border border-white/5 rounded-xl px-3 py-2.5 mb-3 cursor-pointer">
                    <input id="ledger-auto-balance" type="checkbox" checked class="mt-0.5 accent-blue-500">
                    <span class="min-w-0"><strong class="block text-[11.5px] text-gray-200">가계부 변경분을 총 잔액에 반영</strong><span class="block text-[10px] text-gray-500 mt-0.5 leading-snug">입금은 더하고 지출은 빼서 저장합니다. 잔액을 직접 맞췄다면 체크를 해제하세요.</span></span>
                </label>
                <div id="admin-expense-list" class="space-y-2.5"></div>
            </div>

            <!-- ===== 설정 탭 ===== -->
            <div id="tab-settings" class="admin-tab-panel hidden">
                <!-- 공지 배너 -->
                <div class="mb-5">
                    <label class="sec-label text-blue-400 block mb-1.5"><i class="fa-solid fa-bullhorn mr-1"></i>공지사항 배너 (알약 모양)</label>
                    <input type="text" id="admin-notice-input" class="fld w-full px-4 py-3 text-sm" placeholder="배너 문구 입력 (비우면 숨김)">
                </div>

                <!-- 클라우드 백업 -->
                <div class="bg-blue-900/15 p-3.5 rounded-xl border border-blue-900/40">
                    <label class="block sec-label text-blue-400 mb-2.5">☁️ 클라우드 백업 (서버 저장)</label>
                    <button onclick="window.createCloudBackup()" class="w-full bg-transparent border border-blue-500/50 text-blue-400 font-bold py-2.5 rounded-lg text-xs shadow-sm hover:bg-blue-500/10 active:bg-blue-500/20 transition-colors mb-2.5">
                        <i class="fa-solid fa-cloud-arrow-up mr-1"></i> 현재 상태 저장
                    </button>
                    <select id="backup-select" class="fld w-full text-xs p-2 mb-2 h-9">
                        <option value="">백업 기록을 불러오는 중...</option>
                    </select>
                    <button onclick="window.restoreCloudBackup()" class="w-full bg-red-900/20 text-red-400 border border-red-900/50 font-bold py-2.5 rounded-lg text-xs shadow-sm hover:bg-red-900/40 active:bg-red-900/60 transition-colors">
                        <i class="fa-solid fa-clock-rotate-left mr-1"></i> 선택한 날짜로 되돌리기
                    </button>
                    <p class="text-[10px] text-gray-400 mt-2 leading-snug">* '현재 상태 저장'을 누르면 서버에 보관됩니다. 문제가 생기면 목록에서 선택해 되돌리세요.</p>
                </div>
            </div>
        </div>

        <!-- Save -->
        <div class="mt-4 pt-4 border-t border-gray-800 shrink-0">
            <button onclick="window.saveAdminData()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md active:bg-blue-700 transition-colors"><i class="fa-solid fa-floppy-disk mr-1.5"></i>전체 저장하기</button>
        </div>
    </div>

    <!-- UI Logic Scripts -->
    <script>
        window.meetingData = null;
        window.currentDuesMonth = new Date().getMonth() + 1;
        window.adminActiveTab = 'dues';
        window._savedExpenseNet = null;
        window._ledgerAppliedDelta = 0;
        window._ledgerDirty = false;
        window.scheduleData = {};
        window._adminLedgerMeetingKey = '';

        const ADMIN_MEMBERS = ['홍박사', '류짱', '오스틴', '전시기', '이진누', '성원제'];
        const escAttr = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        window.calculateExpenseNet = function(expenses) {
            return (Array.isArray(expenses) ? expenses : []).reduce((sum, entry) => {
                const amount = Math.abs(Number(entry && entry.amount) || 0);
                const income = entry && (entry.type === 'income' || entry.type === '입금' || entry.type === '수입');
                return sum + (income ? amount : -amount);
            }, 0);
        };
        window.markLedgerDirty = function() { window._ledgerDirty = true; };

        const adminDateFromKey = (value) => {
            const parts = String(value || '').split('-').map(Number);
            if (parts.length < 3 || parts.some(Number.isNaN)) return null;
            return new Date(parts[0], parts[1] - 1, parts[2]);
        };
        const adminDateKey = (date) => date
            ? `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`
            : '';
        const adminDateText = (date, withYear = true) => date
            ? `${withYear ? date.getFullYear() + '년 ' : ''}${date.getMonth() + 1}월 ${date.getDate()}일`
            : '';

        window.buildAdminLedgerMeetings = function() {
            const points = [];
            Object.keys(window.scheduleData || {}).sort().forEach(dateKey => {
                const date = adminDateFromKey(dateKey);
                (window.scheduleData[dateKey] || []).forEach(event => {
                    if (date && event && event.type === 'meet') points.push({ date, title: event.title || '정기모임' });
                });
            });
            const meetings = [];
            points.forEach(point => {
                const last = meetings[meetings.length - 1];
                const gap = last ? Math.round((point.date - last.end) / 86400000) : 99;
                if (last && last.title === point.title && gap >= 0 && gap <= 2) last.end = point.date;
                else meetings.push({ key: adminDateKey(point.date), start: point.date, end: point.date, title: point.title });
            });

            // 일정이 삭제되더라도 이미 저장된 모임별 가계부는 선택할 수 있게 유지한다.
            (window.meetingData && Array.isArray(window.meetingData.expenses) ? window.meetingData.expenses : []).forEach(entry => {
                if (!entry.meetingKey || meetings.some(meeting => meeting.key === entry.meetingKey)) return;
                const start = adminDateFromKey(entry.meetingStart || entry.meetingKey);
                const end = adminDateFromKey(entry.meetingEnd || entry.meetingStart || entry.meetingKey);
                if (start) meetings.push({ key: entry.meetingKey, start, end: end || start, title: entry.meetingTitle || '정기모임' });
            });
            meetings.sort((a, b) => a.start - b.start);
            const expenseDates = (window.meetingData && Array.isArray(window.meetingData.expenses) ? window.meetingData.expenses : [])
                .map(entry => adminDateFromKey(entry.date)).filter(Boolean).sort((a, b) => a - b);
            meetings.forEach((meeting, index) => {
                const previous = meetings[index - 1];
                meeting.periodStart = previous
                    ? new Date(previous.end.getFullYear(), previous.end.getMonth(), previous.end.getDate() + 1)
                    : (expenseDates[0] && expenseDates[0] < meeting.start ? expenseDates[0] : meeting.start);
                meeting.periodEnd = meeting.end;
            });
            return meetings;
        };

        window.assignExpensesToMeetings = function(meetings) {
            const expenses = window.meetingData && Array.isArray(window.meetingData.expenses) ? window.meetingData.expenses : [];
            expenses.forEach(entry => {
                let meeting = meetings.find(item => item.key === entry.meetingKey);
                const date = adminDateFromKey(entry.date);
                if (!meeting && date) {
                    meeting = meetings.find(item => date >= item.periodStart && date <= item.periodEnd);
                    if (!meeting && meetings.length) {
                        meeting = meetings.reduce((best, item) =>
                            Math.abs(item.start - date) < Math.abs(best.start - date) ? item : best
                        , meetings[0]);
                    }
                }
                if (!meeting) return;
                entry.meetingKey = meeting.key;
                entry.meetingTitle = meeting.title;
                entry.meetingStart = adminDateKey(meeting.start);
                entry.meetingEnd = adminDateKey(meeting.end);
            });
        };

        window.renderLedgerMeetingControl = function() {
            const select = document.getElementById('admin-ledger-meeting');
            const period = document.getElementById('admin-ledger-period');
            const addButton = document.getElementById('admin-add-expense');
            if (!select) return [];
            const meetings = window.buildAdminLedgerMeetings();
            window.assignExpensesToMeetings(meetings);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (!meetings.some(item => item.key === window._adminLedgerMeetingKey)) {
                const current = meetings.find(item => item.end >= today) || meetings[meetings.length - 1];
                window._adminLedgerMeetingKey = current ? current.key : '';
            }
            select.innerHTML = meetings.length
                ? meetings.slice().reverse().map(meeting =>
                    `<option value="${escAttr(meeting.key)}" ${meeting.key === window._adminLedgerMeetingKey ? 'selected' : ''}>${adminDateText(meeting.start)} · ${meeting.title}</option>`
                ).join('')
                : '<option value="">일정에 정기모임을 먼저 등록하세요</option>';
            const selected = meetings.find(item => item.key === window._adminLedgerMeetingKey);
            if (period) period.textContent = selected
                ? `관리 기간 · ${adminDateText(selected.periodStart)} ~ ${adminDateText(selected.periodEnd)}`
                : '일정의 정기모임 항목을 기준으로 가계부가 만들어집니다.';
            if (addButton) addButton.disabled = !selected;
            return meetings;
        };

        window.selectLedgerMeeting = function(key) {
            try { window.collectExpenses(); } catch (e) {}
            window._adminLedgerMeetingKey = key || '';
            window.renderLedgerMeetingControl();
            window.renderExpenseList();
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('adminAuth') === '0920') {
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('password-screen').classList.remove('flex');
                document.getElementById('admin-screen').classList.remove('hidden');
                document.getElementById('admin-screen').classList.add('flex');
                window.openAdminModalReal();
            }
        });

        window.checkPassword = function() {
            const pw = document.getElementById('admin-password-input').value;
            if (pw === '0920') {
                localStorage.setItem('adminAuth', '0920');
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('password-screen').classList.remove('flex');
                document.getElementById('admin-screen').classList.remove('hidden');
                document.getElementById('admin-screen').classList.add('flex');
                window.openAdminModalReal();
                if (window.adminFirebaseLogin) window.adminFirebaseLogin();
            } else {
                alert('비밀번호가 틀렸습니다.');
            }
        };

        function createEmptyMonthData() {
            return ADMIN_MEMBERS.map(name => ({ name: name, status: 'unpaid', amount: 0, isLeader: name === '전시기' }));
        }

        function getInitialMeetingData() {
            return {
                totalBalance: 448999,
                exemptions: { '류짱': 1, '성원제': 1, '전시기': 1 },
                records: {},
                expenses: []
            };
        }

        // 탭 전환
        window.switchAdminTab = function(name) {
            // 가계부 탭을 떠날 때 입력값이 사라지지 않도록 먼저 수집
            try { window.collectExpenses(); } catch (e) {}
            window.adminActiveTab = name;
            ['dues', 'expense', 'settings'].forEach(t => {
                const panel = document.getElementById('tab-' + t);
                if (panel) panel.classList.toggle('hidden', t !== name);
            });
            document.querySelectorAll('.admin-tab').forEach(btn => {
                const active = btn.getAttribute('data-tab') === name;
                btn.classList.toggle('bg-blue-500', active);
                btn.classList.toggle('text-white', active);
                btn.classList.toggle('text-gray-400', !active);
            });
        };

        window.changeAdminMonth = function(delta) {
            window.currentDuesMonth += delta;
            if (window.currentDuesMonth < 1) window.currentDuesMonth = 12;
            if (window.currentDuesMonth > 12) window.currentDuesMonth = 1;
            window.openAdminModalReal();
        };

        window.openAdminModalReal = function() {
            if (!window.meetingData) window.meetingData = getInitialMeetingData();
            if (!Array.isArray(window.meetingData.expenses)) window.meetingData.expenses = [];
            if (window._savedExpenseNet === null) window._savedExpenseNet = window.calculateExpenseNet(window.meetingData.expenses);

            document.getElementById('admin-month-title').innerText = window.currentDuesMonth;
            document.getElementById('admin-total-balance').value = window.meetingData.totalBalance || 0;
            document.getElementById('admin-notice-input').value = window.meetingData.notice || '';

            // 멤버별 납부
            const list = document.getElementById('admin-member-list');
            list.innerHTML = '';
            if (!window.meetingData.records) window.meetingData.records = {};
            if (!window.meetingData.records[window.currentDuesMonth]) {
                window.meetingData.records[window.currentDuesMonth] = createEmptyMonthData();
            }
            const records = window.meetingData.records[window.currentDuesMonth];
            records.forEach((m, i) => {
                const isPaid = m.status === 'paid';
                const isDeferred = m.status === 'deferred';
                const isStopped = m.status === 'stopped';
                list.innerHTML += `
                <div class="flex items-center justify-between p-3 bg-[#2C2C2E] rounded-xl border border-gray-700">
                    <span class="font-bold text-sm text-[#F2F4F6]">${m.name}</span>
                    <div class="flex items-center gap-1">
                        <div class="relative">
                            <input type="number" id="edit-amt-${i}" class="w-[68px] text-right text-xs p-1.5 pr-5 border border-gray-600 bg-black text-white rounded-lg outline-none focus:border-blue-500 disabled:opacity-40" value="${m.amount}" ${isStopped ? 'disabled' : ''}>
                            <span class="absolute right-1.5 top-1/2 -translate-y-1/2 text-gray-600 text-[10px]">원</span>
                        </div>
                        <button onclick="window.toggleStopped(${i})" class="text-[11px] font-bold px-2 py-1.5 rounded-lg transition-colors ${isStopped ? 'bg-violet-900/40 text-violet-400' : 'bg-[#3C3C3E] text-gray-400'}">중단</button>
                        <button onclick="window.toggleDeferred(${i})" class="text-xs font-bold px-2 py-1.5 rounded-lg transition-colors ${isDeferred ? 'bg-amber-900/30 text-amber-400' : 'bg-[#3C3C3E] text-gray-400'}">유예</button>
                        <button onclick="window.togglePay(${i})" class="text-xs font-bold px-2 py-1.5 rounded-lg transition-colors ${isPaid ? 'bg-blue-900/30 text-blue-400' : ((isDeferred || isStopped) ? 'bg-gray-800 text-gray-500' : 'bg-red-900/30 text-red-400')}">${isPaid ? '납부' : '미납'}</button>
                    </div>
                </div>`;
            });

            // 면제권
            const ticketList = document.getElementById('admin-ticket-list');
            ticketList.innerHTML = '';
            const exemptions = window.meetingData.exemptions || { '류짱': 1, '성원제': 1, '전시기': 1 };
            ADMIN_MEMBERS.forEach((name) => {
                const count = exemptions[name] || 0;
                ticketList.innerHTML += `
                <div class="flex items-center justify-between p-3 bg-emerald-900/15 rounded-xl border border-emerald-900/30">
                    <span class="font-bold text-sm text-[#F2F4F6]">${name}</span>
                    <div class="flex items-center gap-2">

                        <span id="admin-ticket-${name}" class="font-bold text-sm w-4 text-center text-emerald-400">${count}</span>
                        <button onclick="window.updateExemption('${name}', 1)" class="w-7 h-7 rounded-full bg-[#3C3C3E] text-emerald-400 flex items-center justify-center font-bold shadow-sm active:scale-90 transition-transform">+</button>

        window.updateExemption = function(name, delta) {
            const el = document.getElementById(`admin-ticket-${name}`);
            let val = parseInt(el.innerText);
            val += delta;
            if (val < 0) val = 0;
            el.innerText = val;
            if (!window.meetingData.exemptions) window.meetingData.exemptions = { '류짱': 1, '성원제': 1, '전시기': 1 };
            window.meetingData.exemptions[name] = val;
        };

        window.toggleStopped = function(idx) {
            const records = window.meetingData.records[window.currentDuesMonth];
            const totalBalanceInput = document.getElementById('admin-total-balance');
            let currentBalance = parseInt(totalBalanceInput.value) || 0;

            if (records && records[idx]) {
                const m = records[idx];
                if (m.status === 'stopped') {
                    m.status = 'unpaid';
                } else {
                    if (m.status === 'paid') currentBalance -= m.amount;
                    m.status = 'stopped';
                }
                m.amount = 0;
                totalBalanceInput.value = currentBalance;
                window.meetingData.totalBalance = currentBalance;
                window.openAdminModalReal();
            }
        };

        window.toggleDeferred = function(idx) {
            const records = window.meetingData.records[window.currentDuesMonth];
            const totalBalanceInput = document.getElementById('admin-total-balance');
            let currentBalance = parseInt(totalBalanceInput.value) || 0;

            if (records && records[idx]) {
                const m = records[idx];
                if (m.status === 'deferred') {
                    m.status = 'unpaid';
                    m.amount = 0;
                } else {
                    if (m.status === 'paid') currentBalance -= m.amount;
                    m.status = 'deferred';
                    m.amount = 0;
                }
                totalBalanceInput.value = currentBalance;
                window.meetingData.totalBalance = currentBalance;
                window.openAdminModalReal();
            }
        };

        window.togglePay = function(idx) {
            const records = window.meetingData.records[window.currentDuesMonth];
            const totalBalanceInput = document.getElementById('admin-total-balance');
            let currentBalance = parseInt(totalBalanceInput.value) || 0;

            if (records && records[idx]) {
                const m = records[idx];
                const inputEl = document.getElementById(`edit-amt-${idx}`);
                let inputAmount = parseInt(inputEl.value);

                if (m.status === 'paid') {
                    currentBalance -= m.amount;
                    m.status = 'unpaid';
                    m.amount = 0;
                } else {
                    m.status = 'paid';
                    m.amount = (isNaN(inputAmount) || inputAmount === 0) ? 20000 : inputAmount;
                    currentBalance += m.amount;
                }
                totalBalanceInput.value = currentBalance;
                window.meetingData.totalBalance = currentBalance;
                window.openAdminModalReal();
            }
        };

        /* ===== 가계부(지출/입금) 관리 ===== */

            const wrap = document.getElementById('admin-expense-list');

            const selectedEntries = scoped.map(item => item.entry);
            const totalExp = selectedEntries.filter(e => !isInc(e)).reduce((s, e) => s + (Math.abs(Number(e.amount)) || 0), 0);
            const totalInc = selectedEntries.filter(e => isInc(e)).reduce((s, e) => s + (Math.abs(Number(e.amount)) || 0), 0);
            const currentBalance = Math.max(0, Number(window.meetingData.totalBalance) || 0);
            if (sumEl) sumEl.innerHTML = `

                <div class="ledger-summary-card"><span class="block text-[9.5px] text-gray-500">입금 · ${selectedEntries.filter(isInc).length}건</span><strong class="block text-[13px] text-blue-400 mt-1">${totalInc.toLocaleString()}원</strong></div>
                <div class="ledger-summary-card"><span class="block text-[9.5px] text-gray-500">현재 잔액</span><strong class="block text-[13px] text-emerald-400 mt-1">${currentBalance.toLocaleString()}원</strong></div>`;

            if (!selectedMeeting) {

                        <input type="date" id="exp-date-${i}" value="${escAttr(e.date)}" oninput="window.markLedgerDirty()" class="fld flex-1 text-xs px-2 py-1.5">

                    <div class="grid grid-cols-[1fr_1.25fr] gap-2">
                        <div>
                            <label class="sec-label text-gray-500 block mb-1">분류</label>

                        <div class="relative flex-1">
                            <label class="sec-label text-gray-500 block mb-1">금액</label>
                            <input type="number" min="0" id="exp-amount-${i}" value="${Number(e.amount) || 0}" oninput="window.markLedgerDirty()" placeholder="금액" class="fld w-full text-sm pl-3 pr-7 py-2 text-right">
                            <span class="absolute right-3 bottom-2.5 text-gray-500 text-xs">원</span>

                    <div>
                        <label class="sec-label text-gray-500 block mb-1">내역</label>
                        <input type="text" id="exp-title-${i}" value="${escAttr(e.title)}" oninput="window.markLedgerDirty()" placeholder="예: 정기모임 저녁식사" class="fld w-full text-sm px-3 py-2">
                    </div>
                    <div>
                        <label class="sec-label text-gray-500 block mb-1">${income ? '입금 출처' : '사용처'}</label>

                    </div>
                    <div>
                        <label class="sec-label text-gray-500 block mb-1">메모 <span class="font-normal">(선택)</span></label>
                        <input type="text" id="exp-memo-${i}" value="${escAttr(e.memo)}" oninput="window.markLedgerDirty()" placeholder="예: 6명 회식" class="fld w-full text-sm px-3 py-2">
                    </div>

        };

        // 화면의 입력값을 데이터로 수집 (저장/추가/삭제/전환 전에 호출)
        window.collectExpenses = function() {
            if (!window.meetingData || !Array.isArray(window.meetingData.expenses)) return;
            window.meetingData.expenses.forEach((e, i) => {
                const next = { ...e };
                const d = document.getElementById(`exp-date-${i}`); if (d) next.date = d.value;
                const t = document.getElementById(`exp-title-${i}`); if (t) next.title = t.value.trim();
                const a = document.getElementById(`exp-amount-${i}`); if (a) next.amount = Math.abs(parseInt(a.value) || 0);
                const c = document.getElementById(`exp-category-${i}`); if (c) next.category = c.value;
                const p = document.getElementById(`exp-place-${i}`); if (p) next.place = p.value.trim();
                const mo = document.getElementById(`exp-memo-${i}`); if (mo) next.memo = mo.value.trim();
                if (JSON.stringify(next) !== JSON.stringify(e)) window._ledgerDirty = true;
                Object.assign(e, next);
            });
        };

        window.addExpense = function() {
            if (!Array.isArray(window.meetingData.expenses)) window.meetingData.expenses = [];
            window.collectExpenses();
            const meeting = window.buildAdminLedgerMeetings().find(item => item.key === window._adminLedgerMeetingKey);
            if (!meeting) { alert('관리할 모임을 먼저 선택해 주세요.'); return; }
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const entryDate = now >= meeting.periodStart && now <= meeting.periodEnd ? now : meeting.start;
            window.meetingData.expenses.unshift({
                date: adminDateKey(entryDate),
                title: '',
                amount: 0,
                type: 'expense',
                category: '식비',
                place: '',
                memo: '',
                meetingKey: meeting.key,
                meetingTitle: meeting.title,
                meetingStart: adminDateKey(meeting.start),
                meetingEnd: adminDateKey(meeting.end)
            });
            window._ledgerDirty = true;
            window.renderExpenseList();
        };

        window.removeExpense = function(i) {
            window.collectExpenses();
            const item = window.meetingData.expenses[i];
            if (item && (item.title || Number(item.amount)) && !confirm('이 가계부 항목을 삭제할까요?')) return;
            window.meetingData.expenses.splice(i, 1);
            window._ledgerDirty = true;
            window.renderExpenseList();
        };

        window.toggleExpenseType = function(i) {
            window.collectExpenses();
            const e = window.meetingData.expenses[i];
            const toExpense = (e.type === 'income' || e.type === '입금');
            e.type = toExpense ? 'expense' : 'income';
            e.category = toExpense ? '기타' : '기타수입';
            window._ledgerDirty = true;
            window.renderExpenseList();
        };

        window.saveAdminData = async function() {
            if (!window.adminDbReady && window.adminFirebaseLogin) await window.adminFirebaseLogin();
            if (!window.meetingData || !window.meetingDb || !window.adminDbReady) { alert("Google 로그인 후 다시 저장해 주세요."); return; }

            const bal = parseInt(document.getElementById('admin-total-balance').value) || 0;
            window.meetingData.totalBalance = bal;
            window.meetingData.notice = document.getElementById('admin-notice-input').value;

            const records = window.meetingData.records[window.currentDuesMonth];
            if (records) {
                records.forEach((m, i) => {
                    const el = document.getElementById(`edit-amt-${i}`);
                    if (el) m.amount = parseInt(el.value) || 0;
                });
            }

            if (!window.meetingData.exemptions) window.meetingData.exemptions = { '류짱': 1, '성원제': 1, '전시기': 1 };

            // 가계부 입력값 수집 (완전히 빈 항목은 저장 안 함)
            window.collectExpenses();
            if (Array.isArray(window.meetingData.expenses)) {
                window.meetingData.expenses = window.meetingData.expenses.filter(e => (e.title && e.title.trim() !== '') || (Number(e.amount) || 0) !== 0);
            }
            const invalidExpense = (window.meetingData.expenses || []).find(e => !e.date || !e.title || !(Number(e.amount) > 0));
            if (invalidExpense) {
                alert('가계부의 날짜, 내역, 금액을 모두 입력해 주세요.');
                window.adminActiveTab = 'expense';
                window.openAdminModalReal();
                return;
            }
            const ledgerMeetings = window.buildAdminLedgerMeetings();
            window.assignExpensesToMeetings(ledgerMeetings);
            const outsidePeriod = (window.meetingData.expenses || []).find(entry => {
                const meeting = ledgerMeetings.find(item => item.key === entry.meetingKey);
                const date = adminDateFromKey(entry.date);
                return !meeting || !date || date < meeting.periodStart || date > meeting.periodEnd;
            });
            if (outsidePeriod) {
                alert('가계부 날짜가 선택한 모임의 관리 기간을 벗어났습니다.');
                window.adminActiveTab = 'expense';
                window._adminLedgerMeetingKey = outsidePeriod.meetingKey || window._adminLedgerMeetingKey;
                window.openAdminModalReal();
                return;
            }

            // 마지막 저장 상태와 현재 가계부의 순변동 차이만 잔액에 반영한다.
            const currentNet = window.calculateExpenseNet(window.meetingData.expenses);
            const savedNet = Number(window._savedExpenseNet) || 0;
            const targetDelta = currentNet - savedNet;
            const alreadyApplied = Number(window._ledgerAppliedDelta) || 0;
            const autoBalance = document.getElementById('ledger-auto-balance');
            if (!autoBalance || autoBalance.checked) {
                window.meetingData.totalBalance = bal - alreadyApplied + targetDelta;
                window._ledgerAppliedDelta = targetDelta;
            } else {
                window.meetingData.totalBalance = bal - alreadyApplied;
                window._ledgerAppliedDelta = 0;
            }
            document.getElementById('admin-total-balance').value = window.meetingData.totalBalance;

            try {
                await window.setDoc(window.doc(window.meetingDb, ...window.MEETING_PATH), window.meetingData);
                alert('저장 완료! ✅');
                window._savedExpenseNet = currentNet;
                window._ledgerAppliedDelta = 0;
                window._ledgerDirty = false;
                window.renderExpenseList();
            } catch (e) {
                console.error(e);
                alert('저장 실패');
            }
        };
    </script>

    <!-- Firebase Module -->
    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithCustomToken, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, addDoc, collection, query, orderBy, limit, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.MEETING_PATH = ['meeting_account', 'dues_status'];
        window.SCHEDULE_PATH = ['meeting_account', 'schedules'];
        window.BACKUP_PATH = ['meeting_account', 'backups', 'history'];
        window.doc = doc;
        window.setDoc = setDoc;

        const meetingConfig = { apiKey: "AIzaSyAVQ_WdMXKuU2CgTgvSHqLKuAVGPeeDuOQ", authDomain: "enjoy-meeting-account.firebaseapp.com", projectId: "enjoy-meeting-account", storageBucket: "enjoy-meeting-account.firebasestorage.app", messagingSenderId: "956113498506", appId: "1:956113498506:web:b520f2b77fdb3295cb9873" };

        async function initFirebase() {
            const meetingApp = !getApps().length ? initializeApp(meetingConfig, 'meetingApp') : getApps()[0];
            const meetingAuth = getAuth(meetingApp);
            window.meetingDb = getFirestore(meetingApp);
            window.adminDbReady = false;
            let meetingUnsub = null;
            let scheduleUnsub = null;
            let isFirstLoad = true;

            const setDbStatus = (text, connected) => {
                const status = document.getElementById('admin-db-status');
                const button = document.getElementById('admin-db-login');
                if (status) status.textContent = text;
                if (button) {
                    button.classList.toggle('text-emerald-400', !!connected);
                    button.classList.toggle('bg-emerald-500/10', !!connected);
                    button.classList.toggle('text-gray-400', !connected);
                }
            };

            const subscribeMeeting = () => {
                window.adminDbReady = true;
                setDbStatus('DB 연결됨', true);
                if (!meetingUnsub) meetingUnsub = onSnapshot(doc(window.meetingDb, ...window.MEETING_PATH), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.records) {
                            Object.keys(data.records).forEach(month => {
                                data.records[month].forEach(member => {
                                    if (member.name === '지노') member.name = '이진누';
                                });
                            });
                        }
                        if (data.exemptions && data.exemptions['지노'] !== undefined) {
                            data.exemptions['이진누'] = (data.exemptions['이진누'] || 0) + data.exemptions['지노'];
                            delete data.exemptions['지노'];
                        }
                        if (!Array.isArray(data.expenses)) data.expenses = [];
                        if (isFirstLoad || !window._ledgerDirty) {
                            window.meetingData = data;
                            window._savedExpenseNet = window.calculateExpenseNet(data.expenses);
                            window._ledgerAppliedDelta = 0;
                        }

                        // 처음 진짜 데이터를 수신하면 화면 새로고침
                        if (isFirstLoad) {
                            if (document.getElementById('admin-screen').classList.contains('flex')) {
                                window.openAdminModalReal();
                            }
                            isFirstLoad = false;
                        }
                    }
                }, (error) => {
                    console.error(error);
                    window.adminDbReady = false;
                    setDbStatus('권한 확인', false);
                });
                if (!scheduleUnsub) scheduleUnsub = onSnapshot(doc(window.meetingDb, ...window.SCHEDULE_PATH), (docSnap) => {
                    window.scheduleData = docSnap.exists() ? (docSnap.data() || {}) : {};
                    if (document.getElementById('admin-screen').classList.contains('flex')) {
                        window.renderLedgerMeetingControl();
                        if (window.adminActiveTab === 'expense') window.renderExpenseList();
                    }
                }, (error) => {
                    console.error(error);
                    setDbStatus('일정 권한 확인', false);
                });
            };

            try { await setPersistence(meetingAuth, browserLocalPersistence); } catch (e) {}
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            window.adminFirebaseLogin = async function() {
                if (meetingAuth.currentUser && !meetingAuth.currentUser.isAnonymous) {
                    subscribeMeeting();
                    return meetingAuth.currentUser;
                }
                setDbStatus('로그인 중…', false);
                try {
                    if (meetingAuth.currentUser && meetingAuth.currentUser.isAnonymous) await signOut(meetingAuth);
                    const result = await signInWithPopup(meetingAuth, provider);
                    subscribeMeeting();
                    return result.user;
                } catch (error) {
                    console.error(error);
                    setDbStatus('DB 로그인', false);
                    if (error && error.code !== 'auth/popup-closed-by-user') alert('Google 로그인에 실패했습니다.');
                    return null;
                }
            };

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try { await signInWithCustomToken(meetingAuth, __initial_auth_token); } catch (e) { console.error(e); }
            }

            onAuthStateChanged(meetingAuth, (user) => {
                if (user && !user.isAnonymous) subscribeMeeting();
                else {
                    window.adminDbReady = false;
                    setDbStatus('DB 로그인', false);
                    if (user && user.isAnonymous) signOut(meetingAuth).catch(() => {});
                }
            });
        }

        window.createCloudBackup = async function() {
            if (!window.meetingData || !window.meetingDb) { alert("저장할 데이터가 없습니다."); return; }
            if (!confirm("현재 상태를 서버에 백업하시겠습니까?")) return;
            try {
                const backupData = { ...window.meetingData, savedAt: new Date().toISOString() };
                await addDoc(collection(window.meetingDb, ...window.BACKUP_PATH), backupData);
                alert("✅ 안전하게 백업되었습니다!");
                window.fetchBackupList();
            } catch (e) {
                console.error(e);
                alert("백업 중 오류가 발생했습니다.");
            }
        };

        window.fetchBackupList = async function() {
            if (!window.meetingDb) return;
            const selectEl = document.getElementById('backup-select');
            if (!selectEl) return;
            selectEl.innerHTML = '<option>불러오는 중...</option>';
            try {
                const q = query(collection(window.meetingDb, ...window.BACKUP_PATH), orderBy('savedAt', 'desc'), limit(5));
                const querySnapshot = await getDocs(q);
                selectEl.innerHTML = '';
                if (querySnapshot.empty) {
                    selectEl.innerHTML = '<option value="">저장된 백업이 없습니다.</option>';
                    return;
                }
                querySnapshot.forEach((d) => {
                    const data = d.data();
                    const date = new Date(data.savedAt);
                    const label = `${date.getMonth() + 1}월 ${date.getDate()}일 ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')} 저장됨`;
                    const option = document.createElement('option');
                    option.value = d.id;
                    option.innerText = label;
                    selectEl.appendChild(option);
                });
            } catch (e) {
                console.error(e);
                selectEl.innerHTML = '<option>백업 목록 로드 실패</option>';
            }
        };

        window.restoreCloudBackup = async function() {
            const selectEl = document.getElementById('backup-select');
            const docId = selectEl.value;
            if (!docId) { alert("복원할 백업을 선택해주세요."); return; }
            if (!confirm("⚠️ 정말 이 시점으로 되돌리시겠습니까?\n현재 데이터는 사라지고 선택한 백업으로 덮어씌워집니다.")) return;
            try {
                const backupDocRef = doc(window.meetingDb, ...window.BACKUP_PATH, docId);
                const backupSnap = await getDoc(backupDocRef);
                if (!backupSnap.exists()) { alert("백업 데이터를 찾을 수 없습니다."); return; }
                const backupData = backupSnap.data();
                delete backupData.savedAt;
                await setDoc(doc(window.meetingDb, ...window.MEETING_PATH), backupData);
                alert("✅ 복원 완료! 데이터가 성공적으로 되돌려졌습니다.");
                window.openAdminModalReal();
            } catch (e) {
                console.error(e);
                alert("복원 중 오류가 발생했습니다.");
            }
        };

        initFirebase();
    </script>
</body>
</html>
